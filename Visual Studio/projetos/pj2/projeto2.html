<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto 2 - Tunel de Frases Apaixonadas</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="projeto2.css">
</head>
<body>

<main class="app">
  <a href="../projetos.html" class="back-link">
    <span class="material-symbols-rounded">arrow_back</span>
    <span>Voltar aos projetos</span>
  </a>

  <section class="scene" id="scene" aria-label="Tunel romantico em profundidade">
    <div class="nebula" aria-hidden="true"></div>
    <div class="scene-grain" aria-hidden="true"></div>

    <div class="tunnel" aria-hidden="true">
      <div class="grid ceiling"></div>
      <div class="grid floor"></div>
      <div class="grid left-wall"></div>
      <div class="grid right-wall"></div>
    </div>

    <div class="blackhole" aria-hidden="true"></div>

    <div class="dust-layer" id="dustLayer" aria-hidden="true"></div>
    <div class="star-layer" id="starLayer" aria-hidden="true"></div>
    <div class="phrase-layer" id="phraseLayer" aria-hidden="true"></div>
    <div class="heart-layer" id="heartLayer" aria-hidden="true"></div>

    <p class="signature">para helena, com todo o meu amor</p>
  </section>
</main>

<script src="projeto2.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquivo 08</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/perguntas.css">
</head>

<body>

<div class="pergunta-box">

  <h1>Arquivo 08</h1>

  <p class="pergunta">
    O que eu ando pensando muito ultimamente, mas não falo toda hora?
  </p>

  <input type="text" id="resposta" placeholder="Digite sua resposta">

  <button id="confirmarBtn" onclick="verificarResposta()">
    Confirmar
  </button>

  <a href="mensagem8.html" id="btnMensagem" class="btn-mensagem">
    Ver Mensagem
  </a>

  <p id="feedback"></p>

</div>

<script>

/* -------- NORMALIZA TEXTO -------- */
function normalizar(texto){
  return texto
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s]/gi, "")
    .trim();
}

/* -------- REMOVE PALAVRAS IRRELEVANTES -------- */
function limparPalavras(texto){
  const ignorar = ["que","eu","voce","vc","pra","para","o","a"];
  return texto
    .split(" ")
    .filter(p => !ignorar.includes(p))
    .join(" ");
}

/* -------- VERIFICA RESPOSTA -------- */
function verificarResposta(){

  const input = document.getElementById("resposta");
  const feedback = document.getElementById("feedback");
  const botao = document.getElementById("confirmarBtn");
  const btnMensagem = document.getElementById("btnMensagem");

  let respostaUsuario = limparPalavras(
    normalizar(input.value)
  );

  const respostasAceitas = [
    "eu te amo",
    "te amo",
    "amo voce",
    "amo",
    "que voce me ama"
  ];

  let acertou = false;

  respostasAceitas.forEach(resp => {

    if(respostaUsuario.includes(
      limparPalavras(normalizar(resp))
    )){
      acertou = true;
    }

  });

  if(acertou){

    if(!localStorage.getItem("msg8Respondida")){
      let progresso = parseInt(localStorage.getItem("mensagensDesbloqueadas")) || 0;
      progresso++;
      localStorage.setItem("mensagensDesbloqueadas", progresso);
      localStorage.setItem("msg8Respondida", "true");
    }

    feedback.innerText = "Resposta correta ❤️";
    feedback.style.color = "#00ffcc";

    botao.style.display = "none";
    btnMensagem.style.display = "inline-block";

  } else {

    feedback.innerText = "Hmm… pense melhor 😉";
    feedback.style.color = "#ff4d6d";

  }

}

/* -------- SE JÁ ESTIVER DESBLOQUEADO -------- */
document.addEventListener("DOMContentLoaded", function(){

  if(localStorage.getItem("msg8Respondida")){
    document.getElementById("confirmarBtn").style.display = "none";
    document.getElementById("btnMensagem").style.display = "inline-block";
    document.getElementById("feedback").innerText =
      "Mensagem já desbloqueada.";
  }

});

</script>

</body>
</html>

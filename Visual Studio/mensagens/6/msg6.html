<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arquivo 06</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/perguntas.css">
</head>

<body>

<div class="pergunta-box">

  <h1>Arquivo 06</h1>

  <p class="pergunta">
    Qual é minha comida favorita atualmente?
  </p>

  <div class="opcoes">
    <button onclick="verificarResposta('japones')">Japonês</button>
    <button onclick="verificarResposta('voce')">Você</button>
    <button onclick="verificarResposta('churrasco')">Churrasco</button>
    <button onclick="verificarResposta('strogonoff')">Strogonoff</button>
  </div>

  <a href="mensagem6.html" id="btnMensagem" class="btn-mensagem">
    Ver Mensagem
  </a>

  <p id="feedback"></p>

</div>

<script>

function verificarResposta(resposta){

  const feedback = document.getElementById("feedback");
  const btnMensagem = document.getElementById("btnMensagem");

  if(resposta === "strogonoff"){

    if(!localStorage.getItem("msg6Respondida")){
      let progresso = parseInt(localStorage.getItem("mensagensDesbloqueadas")) || 0;
      progresso++;
      localStorage.setItem("mensagensDesbloqueadas", progresso);
      localStorage.setItem("msg6Respondida", "true");
    }

    feedback.innerText = "Resposta correta. Arquivo desbloqueado.";
    feedback.style.color = "#00ffcc";

    btnMensagem.style.display = "inline-block";

  } 

  else if(resposta === "japones" || resposta === "churrasco"){

    feedback.innerText = "Depende do dia, masss naooo 😌";
    feedback.style.color = "#ff4d6d";

  } 

  else if(resposta === "voce"){

    feedback.innerText = "Ainda não experimentei, rsrs 😏";
    feedback.style.color = "#ff4d6d";

  }

}

document.addEventListener("DOMContentLoaded", function(){
  if(localStorage.getItem("msg6Respondida")){
    document.getElementById("btnMensagem").style.display = "inline-block";
    document.getElementById("feedback").innerText = "Você já desbloqueou este arquivo.";
  }
});

</script>

</body>
</html>

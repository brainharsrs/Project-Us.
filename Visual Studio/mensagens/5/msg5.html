<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arquivo 05</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/perguntas.css">
</head>

<body>

<div class="pergunta-box">

  <h1>Arquivo 05</h1>

  <p class="pergunta">
    Qual foi o primeiro apelido que eu te dei?
  </p>

  <input type="text" id="resposta" placeholder="Digite sua resposta">

  <button id="confirmarBtn" onclick="verificarResposta()">
    Confirmar
  </button>

  <a href="mensagem5.html" id="btnMensagem" class="btn-mensagem">
    Ver Mensagem
  </a>

  <p id="feedback"></p>

</div>

<script>

/* ---------- NORMALIZAR TEXTO ---------- */
function normalizar(texto){
  return texto
    .toLowerCase()
    .normalize("NFD") 
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s]/gi, "")
    .trim();
}

/* ---------- VERIFICAR RESPOSTA ---------- */
function verificarResposta(){

  const input = document.getElementById("resposta");
  const feedback = document.getElementById("feedback");
  const botao = document.getElementById("confirmarBtn");
  const btnMensagem = document.getElementById("btnMensagem");

  let respostaUsuario = normalizar(input.value);

  let acertou = false;

  // respostas corretas
  const respostasCorretas = [
    "bis white",
    "lenoca",
    "diamante negro"
  ];

  // verifica se é exatamente uma das respostas válidas
  if(respostasCorretas.includes(respostaUsuario)){
    acertou = true;
  }

  if(acertou){

    if(!localStorage.getItem("msg5Respondida")){
      let progresso = parseInt(localStorage.getItem("mensagensDesbloqueadas")) || 0;
      progresso++;
      localStorage.setItem("mensagensDesbloqueadas", progresso);
      localStorage.setItem("msg5Respondida", "true");
    }

    feedback.innerText = "Resposta correta. Arquivo desbloqueado.";
    feedback.style.color = "#00ffcc";

    botao.style.display = "none";
    btnMensagem.style.display = "inline-block";

  } else {

    feedback.innerText = "Hmm… quase. Mas acho que não era exatamente assim 😏";
    feedback.style.color = "#ff4d6d";

  }
}

/* ---------- SE JÁ FOI RESPONDIDA ---------- */
document.addEventListener("DOMContentLoaded", function(){
  if(localStorage.getItem("msg5Respondida")){
    document.getElementById("confirmarBtn").style.display = "none";
    document.getElementById("btnMensagem").style.display = "inline-block";
    document.getElementById("feedback").innerText = "Você já desbloqueou este arquivo.";
  }
});

</script>

</body>
</html>

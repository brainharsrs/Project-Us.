<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Logout</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Outfit', sans-serif;
background:linear-gradient(135deg,#ffffff,#eaf3ff,#dbeafe);
background-size:300% 300%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:420px;
}

.buttons{
margin-top:25px;
display:flex;
gap:12px;
justify-content:center;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-family:'Outfit', sans-serif;
}

.voltar{
background:#3b82f6;
color:white;
}

.fechar{
background:#111;
color:white;
}

</style>

</head>

<body>

<div class="card">

<h2>Voce saiu.</h2>

<p>
Todo o progresso das mensagens foi apagado.
Mas voce sempre pode voltar e comecar novamente.
</p>

<div class="buttons">

<button class="voltar" onclick="voltar()">Voltar</button>

<button class="fechar" onclick="fecharTela()">Fechar</button>

</div>

</div>

<script>

const progressoKeys = [
"mensagensDesbloqueadas",
"msg1Respondida",
"msg2Respondida",
"msg3Respondida",
"msg4Respondida",
"msg5Respondida",
"msg6Respondida",
"msg7Respondida",
"msg8Respondida",
"msg9Respondida",
"msg10Respondida"
];

progressoKeys.forEach(function(key){
localStorage.removeItem(key);
});

localStorage.removeItem("menuLoginUnlocked");
sessionStorage.removeItem("menuLoginUnlocked");

function voltar(){
window.location.href="index.html";
}

function fecharTela(){
document.body.style.background="black";
document.body.innerHTML="";
}

</script>

</body>
</html>

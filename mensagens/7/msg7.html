<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquivo 07</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/perguntas.css">
</head>

<body>

<div class="pergunta-box">

  <h1>Arquivo 07</h1>

  <p class="pergunta">
    Qual é meu maior sonho hoje?
  </p>

  <input type="text" id="resposta" placeholder="Digite sua resposta">

  <button id="confirmarBtn" onclick="verificarResposta()">
    Confirmar
  </button>

  <a href="mensagem7.html" id="btnMensagem" class="btn-mensagem">
    Ver Mensagem
  </a>

  <p id="feedback"></p>

</div>

<script>

function normalizar(texto){
  return texto
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s]/gi, "")
    .trim();
}

function verificarResposta(){

  const input = document.getElementById("resposta");
  const feedback = document.getElementById("feedback");
  const btnMensagem = document.getElementById("btnMensagem");
  const botao = document.getElementById("confirmarBtn");

  let resposta = normalizar(input.value);

  let acertou = false;

  // Verifica se contém a palavra "casar"
  if(resposta.includes("casar")){
    acertou = true;
  }

  if(acertou){

    if(!localStorage.getItem("msg7Respondida")){
      let progresso = parseInt(localStorage.getItem("mensagensDesbloqueadas")) || 0;
      progresso++;
      localStorage.setItem("mensagensDesbloqueadas", progresso);
      localStorage.setItem("msg7Respondida", "true");
    }

    feedback.innerText = "Resposta correta. Arquivo desbloqueado.";
    feedback.style.color = "#00ffcc";

    botao.style.display = "none";
    btnMensagem.style.display = "inline-block";

  } else {

    feedback.innerText = "Hmm… acho que você sabe essa 😌";
    feedback.style.color = "#ff4d6d";

  }
}

document.addEventListener("DOMContentLoaded", function(){
  if(localStorage.getItem("msg7Respondida")){
    document.getElementById("confirmarBtn").style.display = "none";
    document.getElementById("btnMensagem").style.display = "inline-block";
    document.getElementById("feedback").innerText = "Você já desbloqueou este arquivo.";
  }
});

</script>

</body>
</html>

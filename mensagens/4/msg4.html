<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquivo 04</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/perguntas.css">
</head>

<body>

<div class="pergunta-box">

  <h1>Arquivo 04</h1>

  <p class="pergunta">
    Qual musica marcou o comeco da gente?
  </p>

  <div class="alternativas">
    <button onclick="verificarResposta('Perfect')">Perfect</button>
    <button onclick="verificarResposta('Die With A Smile')">Die With A Smile</button>
    <button onclick="verificarResposta('Photograph')">Photograph</button>
    <button onclick="verificarResposta('Until I Found You')">Until I Found You</button>
  </div>

  <a href="mensagem4.html" id="btnMensagem" class="btn-mensagem">
    Ver Mensagem
  </a>

  <p id="feedback"></p>

</div>

<script>
function verificarResposta(resposta){
  const feedback = document.getElementById("feedback");
  const btnMensagem = document.getElementById("btnMensagem");

  if(resposta === "Die With A Smile"){
    if(!localStorage.getItem("msg4Respondida")){
      let progresso = parseInt(localStorage.getItem("mensagensDesbloqueadas")) || 0;
      progresso++;
      localStorage.setItem("mensagensDesbloqueadas", progresso);
      localStorage.setItem("msg4Respondida", "true");
    }

    feedback.innerText = "Resposta correta. Arquivo desbloqueado.";
    feedback.style.color = "#00ffcc";
    btnMensagem.style.display = "inline-block";
    document.querySelector(".alternativas").style.display = "none";
  } else {
    feedback.innerText = "Hmm... essa nao foi a nossa musica.";
    feedback.style.color = "#ff4d6d";
  }
}

document.addEventListener("DOMContentLoaded", function(){
  if(localStorage.getItem("msg4Respondida")){
    document.querySelector(".alternativas").style.display = "none";
    document.getElementById("btnMensagem").style.display = "inline-block";
    document.getElementById("feedback").innerText = "Voce ja desbloqueou este arquivo.";
  }
});
</script>

</body>
</html>
